schema_version: "2026-04-24.gpt-runtime-v1"
default_profile: scope-first-hybrid

profiles:
  claude-only:
    defaults:
      backend: claude
    roles: {}

  gpt-only:
    defaults:
      backend: codex
      model: gpt-5.5
    roles:
      target-discovery:
        model: gpt-5.5
      reporter:
        model: gpt-5.5
      scout:
        model: gpt-5.5
      recon-scanner:
        model: gpt-5.5

  scope-first-hybrid:
    defaults:
      backend: claude
    safety:
      require_scope_contract: true
      require_safety_wrapper: true
      require_artifact_scope_hash: true
      fail_closed_on_scope_unknown: true
      llm_override_allowed: false
    roles:
      target-discovery:
        backend: codex
        model: gpt-5.5
      scout:
        backend: codex
        model: gpt-5.5
      recon-scanner:
        backend: codex
        model: gpt-5.5
      source-auditor:
        backend: codex
        model: gpt-5.5
      analyst:
        backend: codex
        model: gpt-5.5
      scope-auditor:
        backend: claude
        model: claude-opus-4-6[1m]
      reporter:
        backend: claude
        model: claude-opus-4-6[1m]
      submission-review:
        backend: claude
        model: claude-opus-4-6[1m]
      exploiter:
        backend: codex
        model: gpt-5.5
        debate_mode: gpt-propose-claude-object-gpt-respond
      critic:
        backend: codex
        model: gpt-5.5
        debate_mode: gpt-propose-claude-object-gpt-respond
      triager-sim:
        backend: codex
        model: gpt-5.5
        debate_mode: gpt-propose-claude-object-gpt-respond
    pipeline_roles:
      ai_security:
        ai-recon:
          backend: codex
          model: gpt-5.5
        analyst:
          backend: codex
          model: gpt-5.5
        triager-sim:
          backend: codex
          model: gpt-5.5
          debate_mode: gpt-propose-claude-object-gpt-respond
        reporter:
          backend: claude
          model: claude-opus-4-6[1m]

roles:
  ai-recon:
    backend: claude
    model: sonnet
    phase_class: tool-recon
    rollback_group: domain
    shadow_mode: disabled
    claude_fallback_allowed: true
    mcp_parity_required: [promptfoo, knowledge-fts]
    expected_artifacts: [checkpoint.json]

  analyst:
    backend: claude
    model: sonnet
    phase_class: analysis
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [vulnerability_candidates.md, checkpoint.json]

  architect:
    backend: claude
    model: claude-opus-4-6[1m]
    phase_class: design-review
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [architect_review.md]

  critic:
    backend: claude
    model: claude-opus-4-6[1m]
    phase_class: adversarial-review
    rollback_group: shared
    shadow_mode: compare
    claude_fallback_allowed: true
    disagreement_policy: block-on-critical
    mcp_parity_required: [gdb, ghidra, knowledge-fts]
    expected_artifacts: [critic_review.md]

  defi-auditor:
    backend: claude
    model: claude-opus-4-6[1m]
    phase_class: smart-contract-audit
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [audit_report.md, checkpoint.json]

  exploiter:
    backend: claude
    model: claude-opus-4-6[1m]
    phase_class: poc-development
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    disagreement_policy: block-on-tier-regression
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [checkpoint.json]

  mobile-analyst:
    backend: claude
    model: sonnet
    phase_class: mobile-analysis
    rollback_group: domain
    shadow_mode: disabled
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [checkpoint.json]

  patch-hunter:
    backend: claude
    model: sonnet
    phase_class: patch-diff-analysis
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [patch_analysis.md, checkpoint.json]

  recon-scanner:
    backend: claude
    model: sonnet
    phase_class: recon-scan
    rollback_group: bounty
    shadow_mode: disabled
    claude_fallback_allowed: true
    mcp_parity_required: [nuclei, knowledge-fts]
    expected_artifacts: [checkpoint.json]

  reporter:
    backend: claude
    model: sonnet
    phase_class: reporting
    rollback_group: shared
    shadow_mode: disabled
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [checkpoint.json]

  scope-auditor:
    backend: claude
    model: claude-opus-4-6[1m]
    phase_class: scope-audit
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: false
    disagreement_policy: block-on-unknown-or-oos
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [scope_audit.json, scope_audit.md]

  scout:
    backend: claude
    model: sonnet
    phase_class: recon
    rollback_group: bounty
    shadow_mode: disabled
    claude_fallback_allowed: true
    mcp_parity_required: [nuclei, knowledge-fts, graphrag-security]
    expected_artifacts: [endpoint_map.md, program_context.md, checkpoint.json]

  source-auditor:
    backend: claude
    model: claude-opus-4-6[1m]
    phase_class: source-audit
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts, semgrep, codeql]
    expected_artifacts: [audit_report.md, checkpoint.json]

  submission-review:
    backend: claude
    model: claude-opus-4-6[1m]
    phase_class: submission-review
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    disagreement_policy: block-on-critical
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [submission_review.json]

  target-evaluator:
    backend: claude
    model: sonnet
    phase_class: target-go-nogo
    rollback_group: bounty
    shadow_mode: disabled
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [target_assessment.md, checkpoint.json]

  target-discovery:
    backend: claude
    model: sonnet
    phase_class: target-discovery
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [target_candidates.json, target_candidates.md, checkpoint.json]

  threat-modeler:
    backend: claude
    model: sonnet
    phase_class: threat-model
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [trust_boundary_map.md, role_matrix.md, checkpoint.json]

  triager-sim:
    backend: claude
    model: claude-opus-4-6[1m]
    phase_class: triage-simulation
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    disagreement_policy: block-on-negative-promotion
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [triager_sim_result.json]

  web-tester:
    backend: claude
    model: sonnet
    phase_class: web-workflow-test
    rollback_group: bounty
    shadow_mode: disabled
    claude_fallback_allowed: true
    mcp_parity_required: [browser-use, knowledge-fts]
    expected_artifacts: [web_tester_results.md, checkpoint.json]

  workflow-auditor:
    backend: claude
    model: sonnet
    phase_class: workflow-audit
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [workflow_map.md, checkpoint.json]
