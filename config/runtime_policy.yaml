schema_version: "2026-04-24.gpt-runtime-v1"
default_profile: scope-first-hybrid

profiles:
  claude-only:
    defaults:
      backend: claude
    roles: {}

  gpt-only:
    defaults:
      backend: codex
      model: gpt-5.4
    roles:
      target-discovery:
        model: gpt-5.5
      reporter:
        model: gpt-5.4-mini
      verifier:
        model: gpt-5.4-mini
      scout:
        model: gpt-5.4-mini
      recon-scanner:
        model: gpt-5.4-mini

  scope-first-hybrid:
    defaults:
      backend: claude
    safety:
      require_scope_contract: true
      require_safety_wrapper: true
      require_artifact_scope_hash: true
      fail_closed_on_scope_unknown: true
      llm_override_allowed: false
    roles:
      target-discovery:
        backend: codex
        model: gpt-5.5
      scout:
        backend: codex
        model: gpt-5.4
      recon-scanner:
        backend: codex
        model: gpt-5.4
      source-auditor:
        backend: codex
        model: gpt-5.4
      analyst:
        backend: codex
        model: gpt-5.4
      scope-auditor:
        backend: claude
        model: claude-opus-4-6[1m]
      reporter:
        backend: claude
        model: claude-opus-4-6[1m]
      submission-review:
        backend: claude
        model: claude-opus-4-6[1m]
      exploiter:
        backend: codex
        model: gpt-5.4
        debate_mode: gpt-propose-claude-object-gpt-respond
      critic:
        backend: codex
        model: gpt-5.4
        debate_mode: gpt-propose-claude-object-gpt-respond
      triager-sim:
        backend: codex
        model: gpt-5.4
        debate_mode: gpt-propose-claude-object-gpt-respond
    pipeline_roles:
      ctf_pwn:
        reverser:
          backend: codex
          model: gpt-5.4
        trigger:
          backend: codex
          model: gpt-5.4
        chain:
          backend: codex
          model: gpt-5.4
          debate_mode: gpt-propose-claude-object-gpt-respond
          evidence_gate: machine-style-real-tool-output
        verifier:
          backend: codex
          model: gpt-5.4
          debate_mode: gpt-propose-claude-object-gpt-respond
          evidence_gate: machine-style-3x-local-then-remote
        reporter:
          backend: claude
          model: claude-opus-4-6[1m]
      ctf_rev:
        reverser:
          backend: codex
          model: gpt-5.4
          evidence_gate: machine-style-real-tool-output
        solver:
          backend: codex
          model: gpt-5.4
          debate_mode: gpt-propose-claude-object-gpt-respond
        verifier:
          backend: codex
          model: gpt-5.4
          debate_mode: gpt-propose-claude-object-gpt-respond
          evidence_gate: machine-style-3x-local-then-remote
        reporter:
          backend: claude
          model: claude-opus-4-6[1m]
      firmware:
        reverser:
          backend: claude
          model: claude-opus-4-6[1m]
        exploiter:
          backend: codex
          model: gpt-5.4
          debate_mode: gpt-propose-claude-object-gpt-respond
        reporter:
          backend: claude
          model: claude-opus-4-6[1m]
      ai_security:
        ai-recon:
          backend: codex
          model: gpt-5.4
        analyst:
          backend: codex
          model: gpt-5.4
        triager-sim:
          backend: codex
          model: gpt-5.4
          debate_mode: gpt-propose-claude-object-gpt-respond
        reporter:
          backend: claude
          model: claude-opus-4-6[1m]
      robotics:
        robo-scanner:
          backend: codex
          model: gpt-5.4
          transport_policy: mock-or-replay-required
        analyst:
          backend: codex
          model: gpt-5.4
        reporter:
          backend: claude
          model: claude-opus-4-6[1m]
        cve-manager:
          backend: claude
          model: claude-opus-4-6[1m]
      supplychain:
        sc-scanner:
          backend: codex
          model: gpt-5.4
        analyst:
          backend: codex
          model: gpt-5.4
        triager-sim:
          backend: codex
          model: gpt-5.4
          debate_mode: gpt-propose-claude-object-gpt-respond
        reporter:
          backend: claude
          model: claude-opus-4-6[1m]

roles:
  ai-recon:
    backend: claude
    model: sonnet
    phase_class: tool-recon
    rollback_group: domain
    shadow_mode: disabled
    claude_fallback_allowed: true
    mcp_parity_required: [promptfoo, knowledge-fts]
    expected_artifacts: [checkpoint.json]

  analyst:
    backend: claude
    model: sonnet
    phase_class: analysis
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [vulnerability_candidates.md, checkpoint.json]

  architect:
    backend: claude
    model: opus
    phase_class: design-review
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [architect_review.md]

  chain:
    backend: claude
    model: opus
    phase_class: exploit-chain
    rollback_group: ctf
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [gdb, knowledge-fts]
    expected_artifacts: [chain_report.md, solve.py]

  critic:
    backend: claude
    model: opus
    phase_class: adversarial-review
    rollback_group: shared
    shadow_mode: compare
    claude_fallback_allowed: true
    disagreement_policy: block-on-critical
    mcp_parity_required: [gdb, ghidra, knowledge-fts]
    expected_artifacts: [critic_review.md]

  ctf-solver:
    backend: claude
    model: sonnet
    phase_class: ctf-fast-path
    rollback_group: ctf
    shadow_mode: disabled
    claude_fallback_allowed: true
    mcp_parity_required: [gdb, knowledge-fts]
    expected_artifacts: [solve.py]

  cve-manager:
    backend: claude
    model: sonnet
    phase_class: cve-filing
    rollback_group: domain
    shadow_mode: disabled
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [cve_submission.json, checkpoint.json]

  defi-auditor:
    backend: claude
    model: opus
    phase_class: smart-contract-audit
    rollback_group: bounty
    shadow_mode: compare
    claude_fallback_allowed: true
    mcp_parity_required: [knowledge-fts]
    expected_artifacts: [audit_report.md, checkpoint.json]

  exploiter:
    backend: claude
    model: opus
